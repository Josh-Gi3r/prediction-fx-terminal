# Railway deployment config for prediction-fx-terminal
#
# This pins build + start behavior so Railway nixpacks doesn't drift on us.
# Bun is auto-selected because the repo ships a bun.lock.
#
# `--frozen-lockfile`: this app signs mainnet transactions — the deployed
# dependency tree must be exactly the reviewed bun.lock. Dependency updates
# land via a committed lockfile change, never silently at deploy time.
#
# scripts/migrate.mjs runs at START (not build) because the Railway Postgres
# service is network-reachable at start time but NOT during the build step.

[build]
builder = "nixpacks"
buildCommand = "bun install --frozen-lockfile && node scripts/build-pm-registry.mjs && bun run build"

[deploy]
startCommand = "node scripts/migrate.mjs && bun run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "always"
restartPolicyMaxRetries = 10
numReplicas = 1
